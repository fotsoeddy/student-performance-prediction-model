server {
    listen 80;
    listen [::]:80;
    
    # Domain for the ML Model API
    server_name model-predictly.nitypulse.com;

    location / {
        proxy_pass http://127.0.0.1:8003; # Fast API Local port configured in .env usually
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
